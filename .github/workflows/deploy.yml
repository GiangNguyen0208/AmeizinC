name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/15 2-8 * * 1-5"
    - cron: "0 12 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  NEXT_PUBLIC_APP_NAME: Ameizin
  NEXT_PUBLIC_BASE_PATH: /AmeizinC
  NEXT_PUBLIC_ENABLE_MOCK_DATA: "false"

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/checkout@v4

      # --- Crawl market data ---
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Restore cached market data
        uses: actions/cache@v4
        with:
          path: public/data
          key: market-data-${{ github.run_id }}
          restore-keys: market-data-

      - name: Crawl market data
        continue-on-error: true
        env:
          VNSTOCK_API_KEY: ${{ secrets.VNSTOCK_API_KEY }}
        run: python scripts/crawl.py

      # --- Build Next.js ---
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
