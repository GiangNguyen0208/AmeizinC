name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  NEXT_PUBLIC_APP_NAME: Ameizin
  NEXT_PUBLIC_BASE_PATH: /AmeizinC
  NEXT_PUBLIC_FIINTRADE_API_URL: https://fiin-core.ssi.com.vn/Master
  NEXT_PUBLIC_SIMPLIZE_API_URL: https://simplize.vn/api
  NEXT_PUBLIC_VPS_API_URL: https://bgapidatafeed.vps.com.vn
  NEXT_PUBLIC_ENABLE_MOCK_DATA: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
