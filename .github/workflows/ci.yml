name: CI — Lint, Type Check & Build

on:
  pull_request:
    branches: [main, master]

env:
  NEXT_PUBLIC_APP_NAME: Ameizin
  NEXT_PUBLIC_BASE_PATH: /AmeizinC
  NEXT_PUBLIC_FIINTRADE_API_URL: https://fiin-core.ssi.com.vn/Master
  NEXT_PUBLIC_SIMPLIZE_API_URL: https://simplize.vn/api
  NEXT_PUBLIC_VPS_API_URL: https://bgapidatafeed.vps.com.vn
  NEXT_PUBLIC_ENABLE_MOCK_DATA: "true"

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npm run lint

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npx tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npm run build

      - name: Verify static output exists
        run: |
          test -d out || (echo "Build output missing" && exit 1)
          test -f out/index.html || (echo "index.html missing" && exit 1)
          echo "Build output OK — $(find out -type f | wc -l) files generated"
