name: Crawl Financial Data

on:
  schedule:
    # Chạy mỗi 15 phút trong giờ giao dịch VN (9:00-15:00 UTC+7 = 2:00-8:00 UTC)
    # Thứ 2-6 only
    - cron: "*/15 2-8 * * 1-5"
    # Chạy 1 lần/ngày ngoài giờ giao dịch (để có data cập nhật)
    - cron: "0 12 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

env:
  KBS_API_URL: ${{ secrets.KBS_API_URL }}

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Run crawler
        run: npx tsx scripts/crawl.ts

      - name: Check for changes
        id: changes
        run: |
          git add public/data/
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No data changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Data changes detected"
          fi

      - name: Commit & push data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "data: update financial data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
